name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Streamlit
        run: |
          URL="https://cuu-hoc-bai.streamlit.app/"

          echo "Pinging $URL"

          for i in 1 2 3
          do
            echo "Attempt $i"

            if curl -L \
                --connect-timeout 20 \
                --max-time 60 \
                --retry 3 \
                --retry-delay 5 \
                --retry-all-errors \
                -f \
                "$URL"; then
              echo "Success!"
              exit 0
            fi

            sleep 10
          done

          echo "Failed!"
          exit 1
